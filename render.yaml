services:
  - type: web
    name: pathiq-api
    env: node
    plan: free
    buildCommand: "npm install && npx turbo run build --filter=@peerprep/server"
    startCommand: "cd apps/server && npx prisma migrate deploy && npm run start"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pathiq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pathiq-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: CLIENT_URL
        value: "https://pathiq-web.onrender.com"

  - type: web
    name: pathiq-web
    env: node
    plan: free
    buildCommand: "npm install && npx turbo run build --filter=web"
    startCommand: "cd apps/web && npm run start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://pathiq-api.onrender.com"
      - key: NEXT_PUBLIC_SOCKET_URL
        value: "https://pathiq-api.onrender.com"

  - type: redis
    name: pathiq-redis
    ipAllowList: []
    plan: free

databases:
  - name: pathiq-db
    databaseName: peerprep
    user: peerprep
    plan: free
