services:
  - type: web
    name: pathiq-api
    env: docker
    dockerfilePath: apps/server/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pathiq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pathiq-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: CLIENT_URL
        value: "https://pathiq-web.onrender.com"

  - type: web
    name: pathiq-web
    env: docker
    dockerfilePath: apps/web/Dockerfile
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://pathiq-api.onrender.com"
      - key: NEXT_PUBLIC_SOCKET_URL
        value: "https://pathiq-api.onrender.com"
      - key: PORT
        value: 3000

  - type: redis
    name: pathiq-redis
    ipAllowList: []
    plan: free

databases:
  - name: pathiq-db
    databaseName: peerprep
    user: peerprep
    plan: free
