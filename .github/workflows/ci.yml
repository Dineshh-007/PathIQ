name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── TypeScript type-check ──────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check server
        run: cd apps/server && npx tsc --noEmit

      - name: Type-check web
        run: cd apps/web && npx tsc --noEmit

  # ─── Vitest unit tests (no DB needed) ──────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: cd apps/server && npx vitest run --reporter=verbose

  # ─── Playwright E2E tests (requires live stack) ─────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: peerprep
          POSTGRES_PASSWORD: peerprep_secret
          POSTGRES_DB: peerprep
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://peerprep:peerprep_secret@localhost:5432/peerprep
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret-not-for-production
      JWT_REFRESH_SECRET: ci-test-refresh-secret-not-for-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      CLIENT_URL: http://localhost:3000
      PORT: 3001
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply DB migrations
        run: cd apps/server && npx prisma migrate deploy

      - name: Seed database
        run: cd apps/server && npm run db:seed

      - name: Build server
        run: cd apps/server && npm run build

      - name: Start server (background)
        run: |
          cd apps/server && node dist/index.js &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # Wait for health endpoint
          for i in $(seq 1 20); do
            curl -sf http://localhost:3001/health && break || sleep 2
          done

      - name: Build & start web (background)
        run: |
          cd apps/web && npm run build
          npm run start &
          echo "WEB_PID=$!" >> $GITHUB_ENV
          sleep 5

      - name: Install Playwright browsers
        run: cd apps/web && npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: cd apps/web && npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ─── Docker build validation ────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: false
          tags: peerprep-server:ci

      - name: Build web image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: peerprep-web:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3001
            NEXT_PUBLIC_SOCKET_URL=http://localhost:3001
