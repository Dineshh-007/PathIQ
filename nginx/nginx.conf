# ─────────────────────────────────────────────────────────────────────────────
# PeerPrep — Nginx Reverse Proxy
#
# Routes:
#   /api/*        → Fastify server  (port 3001)
#   /socket.io/*  → Socket.io       (port 3001, with WebSocket upgrade)
#   /*            → Next.js frontend (port 3000)
#
# To enable HTTPS: uncomment the SSL server block and point certs at
# /etc/nginx/ssl/fullchain.pem + privkey.pem (e.g. from Let's Encrypt).
# ─────────────────────────────────────────────────────────────────────────────

upstream api_server {
    server server:3001;
    keepalive 32;
}

upstream web_server {
    server web:3000;
    keepalive 32;
}

# ─── Redirect HTTP → HTTPS (enable in production with real certs) ─────────────
# server {
#     listen 80;
#     server_name yourdomain.com;
#     return 301 https://$host$request_uri;
# }

# ─── Main server block ────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;           # catch-all; replace with your domain in production

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"          always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection "1; mode=block"       always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Socket.io (must come before /api to match /socket.io path) ───────────
    location /socket.io/ {
        proxy_pass         http://api_server;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for persistent connections
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── REST API ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api_server;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API response caching: never cache auth/mutation responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";

        # Increase body size limit (answers can be long)
        client_max_body_size 2M;
    }

    # ── Health check endpoint (bypasses upstream, useful for load balancers) ──
    location /health {
        proxy_pass http://api_server;
        proxy_http_version 1.1;
        access_log off;
    }

    # ── Next.js frontend (everything else) ───────────────────────────────────
    location / {
        proxy_pass         http://web_server;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js HMR WebSocket (dev only — harmless in prod)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://web_server;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}

# ─── HTTPS block (uncomment + fill certs for production) ─────────────────────
